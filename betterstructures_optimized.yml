# BetterStructures Optimized Configuration
# Giảm impact lên server performance trong khi giữ gameplay experience

lowestYNormalCustom: -60
highestYNormalCustom: 320
lowestYNether: 4
highestYNether: 120
lowestYEnd: 0
highestYEnd: 320
normalCustomAirBuildingMinAltitude: 80
normalCustomAirBuildingMaxAltitude: 120
endAirBuildMinAltitude: 80
endAirBuildMaxAltitude: 120
warnAdminsAboutNewBuildings: false
regionProtectedMessage: '&8[BetterStructures] &cDefeat the zone''s bosses to edit blocks!'
protectEliteMobsRegions: true
setupDone: false

# TỐI ƯU HÓA: Giảm tốc độ pasting để giảm lag
# Original: 10 → Optimized: 5
modularChunkPastingSpeed: 5

# TỐI ƯU HÓA: Giảm percentage tick dùng cho pasting
# Original: 0.2 (20%) → Optimized: 0.05 (5%)
# Ranges from 0.01 to 1, where 0.01 is 1% and 1 is 100%
# Slower speeds will lower performance impact
percentageOfTickUsedForPasting: 0.05

# TỐI ƯU HÓA: Giảm percentage tick dùng cho pregeneration
# Original: 0.1 (10%) → Optimized: 0.03 (3%)
# This controls how much of each server tick is dedicated to generating chunks
percentageOfTickUsedForPregeneration: 0.03

# TỐI ƯU HÓA: Tăng TPS threshold để pause pregeneration sớm hơn
# Original: 12.0 → Optimized: 16.0
# Khi TPS dưới 16 thì pause pregeneration
pregenerationTPSPauseThreshold: 16.0

# TỐI ƯU HÓA: Tăng TPS threshold để resume pregeneration muộn hơn
# Original: 14.0 → Optimized: 18.0
# Chỉ resume khi TPS đạt 18 trở lên
pregenerationTPSResumeThreshold: 18.0

# TỐI ƯU HÓA: Tăng khoảng cách giữa structures để giảm số lượng
# Original: 27 → Optimized: 35
distanceSurface: 35

# TỐI ƯU HÓA: Tăng khoảng距 shallow underground
# Original: 22 → Optimized: 30
distanceShallow: 30

# TỐI ƯU HÓA: Tăng khoảng距 deep underground
# Original: 22 → Optimized: 30
distanceDeep: 30

# TỐI ƯU HÓA: Tăng khoảng距 sky structures
# Original: 90 → Optimized: 120
distanceSky: 120

# TỐI ƯU HÓA: Tăng khoảng距 liquid structures
# Original: 60 → Optimized: 80
distanceLiquid: 80

# TỐI ƯU HÓA: Tăng khoảng距 dungeons
# Original: 80 → Optimized: 100
distanceDungeonV2: 100

# Giữ nguyên randomization offsets
maxOffsetSurface: 5
maxOffsetShallow: 5
maxOffsetDeep: 5
maxOffsetSky: 5
maxOffsetLiquid: 5
maxOffsetDungeonV2: 18

# Tăng spawn protection radius
# Original: 100 → Optimized: 200
spawnProtectionRadius: 200

nightbreak:
  # Tắt auto-update để tránh download trong khi server đang lag
  # Original: true → Optimized: false
  auto-update: false
