# ChunkEntityLimiter Config cho BreadMC
# Giới hạn entities vừa đủ để fix crash nhưng không ảnh hưởng farming

entity-limits:
  # Giới hạn vừa đủ cho gameplay
  default-limit: 60

  # Giới hạn item drops (đủ để farming)
  item-limit: 2000

  # Check mỗi 2 giây (để phản hồi cực nhanh khi spawn quá nhiều mobs)
  check-interval-ticks: 40

  # Check vùng quanh player (3x3 chunks)
  chunk-check-radius: 1

  # Multiplier cho vùng quanh player (thoáng hơn)
  chunk_entity_multiplier: 2.0
  chunk_item_multiplier: 2.0

  # Không count stack amount
  count-item-stack-amount: false

  # Bỏ qua các entities quan trọng
  ignored-types:
    - IRON_GOLEM
    - VILLAGER
    - PLAYER

  # Bỏ qua các items quan trọng
  ignored-items:
    - DIAMOND
    - NETHERITE_INGOT
    - ENCHANTED_GOLDEN_APPLE

  # Giới hạn cụ thể cho Witch và các mobs gây lag (x2 cho farming)
  custom-limits:
    WITCH: 30          # Giới hạn Witch xuống 30 per chunk (x2)
    ENDERMAN: 40       # Giới hạn Enderman (x2, đủ farming ender pearls)
    ZOMBIE: 80         # Giới hạn Zombie (x2, đủ farming)
    CREEPER: 60        # Giới hạn Creeper (x2)
    SKELETON: 60       # Giới hạn Skeleton (x2)
    SPIDER: 60         # Giới hạn Spider (x2)

protection:
  protect-named-entities: true
  protect-leashed-entities: true
  protect-tamed-animals: true
  protect-equipped-entities: true
  protect-boss-entities: true

settings:
  # Clean protected entities nếu vẫn vượt quá limit
  clean-protected-if-over-limit: true

  # Clean tất cả loaded chunks
  clean-all-loaded-chunks: true

  # Chỉ OP nhận notification
  cleanup-report-scope: OP
  overload-warning-scope: OP

  # OP nhận global reports
  op-global-cleanup-report: true
  op-global-overload-warning: true

  # Console report
  console-cleanup-report: true

  # Warning threshold
  notify-threshold: 80
  notify-cooldown: 10
  notification-radius: 128.0

  # Performance monitoring
  performance-monitoring: true
  debug-mode: false
  language: en
